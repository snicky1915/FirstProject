<?xml version="1.0" encoding="UTF-8"?>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Order XHTML Example</title>
</head>
<body style="font-family: Arial;">
<h2>
    Xin chao
    <span th:text="${customerName}">Cuong</span>
</h2>

<p>Day la vi du XHTML: van la HTML tags, nhung cu phap la XML hop le.</p>

<table border="1" cellpadding="8" cellspacing="0"
       style="border-collapse: collapse; width: 100%;">
    <thead>
    <tr>
        <th>San pham</th>
        <th>So luong</th>
        <th>Gia</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="item : ${items}">
        <td th:text="${item.name}">Sample Product</td>
        <td th:text="${item.qty}">1</td>
        <td th:text="${item.price}">0</td>
    </tr>
    </tbody>
</table>

<p>
    Tong tien:
    <strong th:text="${total}">0</strong>
    KRW
</p>

<br />
</body>
</html>
